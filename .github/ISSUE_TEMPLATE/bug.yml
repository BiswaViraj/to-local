name: Bug report
description: Report incorrect behavior with a reproducible case.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove private timestamps, URLs, and page data before submitting.
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide a minimal fixture or precise steps.
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome version
    validations:
      required: true
  - type: input
    id: extension
    attributes:
      label: toLocal version
    validations:
      required: true

