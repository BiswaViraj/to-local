name: Repository

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify repository policy files
        run: |
          test -f LICENSE
          test -f README.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODE_OF_CONDUCT.md
      - name: Reject tracked environment files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)'; then
            echo "Tracked environment file detected."
            exit 1
          fi
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Design token contrast
        run: pnpm check:contrast
      - name: Unit tests
        run: pnpm test
      - name: Build production extension
        run: pnpm build
      - name: Content-script bundle budget
        run: pnpm check:bundle
      - name: Browser tests
        run: pnpm test:e2e
      - name: Package extension
        run: pnpm zip
